name: Update KRX Market Data

# KST 장중(09:00~15:40) 10분 주기로 실행 → UTC 00:00~06:40 월~금
# workflow_dispatch 로 수동 실행도 가능
on:
  schedule:
    - cron: "*/10 0-6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Fetch KRX market data
        run: python scripts/fetch_krx.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain data/market.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/market.json
            git commit -m "chore(data): refresh KRX market snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No data changes."
          fi
